name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build every time you push code to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Uses the stable Node.js version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Installs your npm packages cleanly

      - name: Build project
        run: npm run build # Vite creates the 'dist' folder here

      - name: Upload production artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Tells GitHub to upload the folder Vite built

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
